<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0B0D10" />
<title>SANJEEV-AI CHAT</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">

  <!-- Header -->
  <header class="topbar">
    <div class="topbar__mark" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="20" height="20">
        <path d="M12 2 L21 7 L21 17 L12 22 L3 17 L3 7 Z" fill="none" stroke="currentColor" stroke-width="1.6"/>
        <path d="M12 7 L16.5 9.5 L16.5 14.5 L12 17 L7.5 14.5 L7.5 9.5 Z" fill="currentColor" opacity="0.9"/>
      </svg>
    </div>
    <div class="topbar__info">
      <span class="topbar__title">SANJEEV-Ai chat</span>
      <span class="topbar__model" id="modelLabel">connecting…</span>
    </div>
    <button class="topbar__reset" id="resetBtn" aria-label="Start new chat">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 1 0 3-6.7"/>
        <path d="M3 4v5h5"/>
      </svg>
    </button>
  </header>

  <!-- Messages -->
  <main class="thread" id="thread">
    <div class="empty-state" id="emptyState">
      <div class="empty-state__glyph">
        <svg viewBox="0 0 24 24" width="30" height="30">
          <path d="M12 2 L21 7 L21 17 L12 22 L3 17 L3 7 Z" fill="none" stroke="currentColor" stroke-width="1.4"/>
          <path d="M12 7 L16.5 9.5 L16.5 14.5 L12 17 L7.5 14.5 L7.5 9.5 Z" fill="currentColor" opacity="0.85"/>
        </svg>
      </div>
      <h1>Ask me anything</h1>
      <p>Running on NVIDIA-hosted inference. Your first message starts the chat.</p>
      <div class="suggestions" id="suggestions">
        <button class="suggestion-chip">Explain quantum computing simply</button>
        <button class="suggestion-chip">Write a short poem about the sea</button>
        <button class="suggestion-chip">Give me a 5-min workout</button>
      </div>
    </div>
  </main>

  <!-- Composer -->
  <footer class="composer">
    <div class="composer__bar" id="composerBar">
      <textarea
        id="input"
        class="composer__input"
        placeholder="Message sanjeev Ai…"
        rows="1"
        maxlength="4000"
      ></textarea>
      <button class="composer__send" id="sendBtn" aria-label="Send message" disabled>
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14"/>
          <path d="M13 6l6 6-6 6"/>
        </svg>
      </button>
    </div>
    <p class="composer__hint" id="composerHint">&nbsp;</p>
  </footer>

</div>

<template id="msgTemplate">
  <div class="msg">
    <div class="msg__bubble"></div>
  </div>
</template>

<template id="meterTemplate">
  <div class="meter" aria-label="Thinking">
    <span></span><span></span><span></span><span></span><span></span>
  </div>
</template>

<script src="script.js"></script>
</body>
</html>
